  from-source-test:
    strategy:
      matrix:
        os: [
          macos-15,
          macos-14,
          ubuntu-latest,
          windows-latest,
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Install bison
        if: ${{ matrix.os == 'macos-15' || matrix.os == 'macos-14' }}
        run: |
          brew install bison gcc
      - name: Test from-source
        run: |
          cargo b --features from-source -vv
          cargo t --features from-source create
          cargo t --features from-source --examples

  linux-system-test:
    runs-on: ubuntu-22.04
    env:
      SCIP_VERSION: 10.0.2
    steps:
      - uses: actions/checkout@v3

      - name: Install SCIP from debian package
        run: |
          wget --quiet --no-check-certificate https://github.com/scipopt/scip/releases/download/v${{ env.SCIP_VERSION }}/scipoptsuite_${{ env.SCIP_VERSION }}-1+jammy_amd64.deb
          sudo apt-get update
          sudo apt install -y ./scipoptsuite_${{ env.SCIP_VERSION }}-1+jammy_amd64.deb

      - name: Verify SCIP headers are in standard locations
        run: |
          echo "Checking for headers in standard locations..."
          ls -la /usr/include/scip/ || echo "No headers in /usr/include/scip"
          ls -la /usr/local/include/scip/ || echo "No headers in /usr/local/include/scip"

      - name: Build and test (should find headers in system directories)
        run: |
          cargo b -vv
          cargo t create
          cargo t --examples

  linux-conda-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: test
          allow-softlinks: true

      - name: Install dependencies (SCIPOptSuite)
        run: |
          conda install -y --prefix $CONDA/envs/test --channel conda-forge scip=10.0.2
          echo "LD_LIBRARY_PATH=$CONDA/envs/test/lib" >> "${GITHUB_ENV}"
          echo "CONDA_PREFIX=$CONDA/envs/test" >> "${GITHUB_ENV}"

      - name: Test
        run: |
          cargo b -vv
          cargo t create
          cargo t --examples

