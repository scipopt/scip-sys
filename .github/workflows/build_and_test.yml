name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  bundled-test:
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          macos-15,
          macos-14, # macOS arm runner
          windows-latest,
          ubuntu-24.04-arm
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Test bundled
        run: |
          cargo b --features bundled --release
          cargo t --features bundled --release create
          cargo t --features bundled --release --examples

  # Exercises the lean path: --no-default-features drops bindgen + libclang and
  # uses the committed prebuilt bindings. Skips platforms whose bindings have not
  # been committed yet (run the generate-bindings workflow to populate them).
  bundled-lean-test:
    strategy:
      fail-fast: false
      matrix:
        os: [
          ubuntu-latest,
          macos-15-intel, # Intel macOS runner
          macos-14, # macOS arm runner
          windows-latest,
          ubuntu-24.04-arm
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Test bundled (no bindgen)
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)     target=linux ;;
            Linux-ARM64)   target=linux-arm ;;
            macOS-X64)     target=macos-intel ;;
            macOS-ARM64)   target=macos-arm ;;
            Windows-X64)   target=windows ;;
            *) echo "::error::Unsupported runner ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          if [ ! -f "src/bindings/$target.rs" ]; then
            echo "::warning::No committed bindings for '$target' yet; skipping lean test. Run the generate-bindings workflow."
            exit 0
          fi
          cargo b --no-default-features --features bundled --release
          cargo t --no-default-features --features bundled --release create
          cargo t --no-default-features --features bundled --release --examples

  # Verifies the committed prebuilt bindings still match what bindgen produces on
  # each platform, so they cannot silently drift from the pinned SCIP release.
  bundled-bindings-drift:
    strategy:
      fail-fast: false
      matrix:
        os: [
          ubuntu-latest,
          macos-15-intel, # Intel macOS runner
          macos-14, # macOS arm runner
          windows-latest,
          ubuntu-24.04-arm
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Regenerate and check for drift
        shell: bash
        env:
          SCIP_SYS_REGENERATE_BINDINGS: "1"
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)     target=linux ;;
            Linux-ARM64)   target=linux-arm ;;
            macOS-X64)     target=macos-intel ;;
            macOS-ARM64)   target=macos-arm ;;
            Windows-X64)   target=windows ;;
            *) echo "::error::Unsupported runner ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          tracked=true
          git ls-files --error-unmatch "src/bindings/$target.rs" >/dev/null 2>&1 || tracked=false
          # Regenerates src/bindings/$target.rs in place.
          cargo b --features bundled --release
          if [ "$tracked" = false ]; then
            echo "::warning::No committed bindings for '$target' yet; not enforcing drift. Run the generate-bindings workflow."
            exit 0
          fi
          if ! git diff --exit-code -- "src/bindings/$target.rs"; then
            echo "::error::Prebuilt bindings for '$target' are out of date. Run the generate-bindings workflow and commit the result."
            exit 1
          fi

